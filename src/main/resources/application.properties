spring.application.name=SPAMMY
spammy.frontend.url=${FRONTEND_URL}
spammy.jwt.secret=${JWT_SECRET}
spammy.jwt.expiration=${JWT_EXPIRATION}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spammy.esi.client-id=${ESI_CLIENT_ID}
spammy.esi.client-secret=${ESI_CLIENT_SECRET}
spammy.esi.callback-url=${CALLBACK_URL}
spammy.esi.scopes=${ESI_SCOPES}

spring.data.redis.host=localhost
spring.data.redis.port=6379
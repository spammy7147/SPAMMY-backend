spring.application.name=SPAMMY
spammy.frontend.url=${FRONTEND_URL}
spammy.jwt.secret=${JWT_SECRET}
spammy.jwt.expiration=${JWT_EXPIRATION}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spammy.esi.client-id=${ESI_CLIENT_ID}
spammy.esi.client-secret=${ESI_CLIENT_SECRET}
spammy.esi.callback-url=${CALLBACK_URL}
spammy.esi.scopes=${ESI_SCOPES}

spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.password=${REDIS_PASSWORD}

# Spring Security OAuth2 Client Configuration for EVE Online
spring.security.oauth2.client.registration.eve.client-id=${ESI_CLIENT_ID}
spring.security.oauth2.client.registration.eve.client-secret=${ESI_CLIENT_SECRET}
spring.security.oauth2.client.registration.eve.client-authentication-method=client_secret_basic
spring.security.oauth2.client.registration.eve.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.eve.redirect-uri={baseUrl}/login/oauth2/code/eve
spring.security.oauth2.client.registration.eve.scope=${ESI_SCOPES}

spring.security.oauth2.client.provider.eve.authorization-uri=https://login.eveonline.com/v2/oauth/authorize
spring.security.oauth2.client.provider.eve.token-uri=https://login.eveonline.com/v2/oauth/token
spring.security.oauth2.client.provider.eve.user-info-uri=https://login.eveonline.com/oauth/verify
spring.security.oauth2.client.provider.eve.user-name-attribute=CharacterID
